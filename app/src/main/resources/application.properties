spring.application.name=ArmTick.am
spring.application.version=1.0.0
# Profile is set via SPRING_PROFILES_ACTIVE environment variable
# Default to dev only if not specified
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# Config import for local development (Docker/Prod provides env vars directly)
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
# SERVER CONFIGURATION (common)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=false

# Logging pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
# JSON / Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC
# Redis Connection Pool (Common)
spring.data.redis.timeout=2s
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2s
spring.data.redis.lettuce.shutdown-timeout=100ms
# Media Upload Configuration
venues.media.upload-dir=uploads
venues.media.base-url=
venues.media.max-file-size=10485760
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
# Frontend base URL (used for email links)
app.frontend.url=${FRONTEND_URL:https://venues.app}

# JWT Secret
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET}