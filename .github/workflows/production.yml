name: Production Deployment

on:
  push:
    branches: [ "master" ]

# Prevent concurrent deployments - queue subsequent runs
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  # Define image name once to avoid typos
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/armtick-api

jobs:
  # --- JOB 1: BUILD, SCAN & PUSH ---
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Metadata (Tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Use raw sha with full commit hash to ensure match with deploy job
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Use caching to speed up builds
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:cache,mode=max

      # --- SECURITY SCANNING ---
      # 1. Run Trivy (Fail only on CRITICAL, warn on HIGH)
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true  # Don't fail on vulnerabilities that have no fix

      # 2. Upload results (Optional - only works if Code Scanning is enabled)
      # We use continue-on-error because private repos need Advanced Security license for this
      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'


  # --- JOB 2: DEPLOY TO SERVER ---
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # Uncomment after creating 'production' environment in GitHub Settings > Environments:
    # environment:
    #   name: production
    #   url: https://api.armticket.am/actuator/health
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Copy the docker-compose file to the server
      - name: Copy Compose File to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          fingerprint: ${{ secrets.HETZNER_SSH_FINGERPRINT }}
          source: "docker-compose.production.yml"
          target: "/opt/armtick-api"

      # SSH in and Deploy with rollback support
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Use the exact same name and tag we built in Job 1
          IMAGE_TAG: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          # SECRETS: All credentials AND connection strings (in PROD_ENV_FILE)
          PROD_SECRETS: ${{ secrets.PROD_ENV_FILE }}
          # VARIABLES: Only truly non-sensitive config
          FRONTEND_URL: ${{ vars.FRONTEND_URL || 'https://armtick.am' }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS || '' }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          fingerprint: ${{ secrets.HETZNER_SSH_FINGERPRINT }}
          envs: IMAGE_TAG,PROD_SECRETS,FRONTEND_URL,ALLOWED_ORIGINS
          command_timeout: 10m
          script: |
            set -e # Stop script on any error
            
            # --- INPUT VALIDATION ---
            if [ -z "$IMAGE_TAG" ]; then
              echo "ERROR: IMAGE_TAG is not set!"
              exit 1
            fi
            
            if [ -z "$PROD_SECRETS" ]; then
              echo "ERROR: PROD_SECRETS is not set!"
              exit 1
            fi
            
            echo "==> Deploying Version: $IMAGE_TAG"
            
            # Ensure folder exists
            mkdir -p /opt/armtick-api
            cd /opt/armtick-api
            
            # --- BACKUP CURRENT STATE FOR ROLLBACK ---
            PREVIOUS_IMAGE=""
            if [ -f .env.production ]; then
              PREVIOUS_IMAGE=$(grep "^BACKEND_IMAGE=" .env.production | cut -d'=' -f2 || true)
              cp .env.production .env.production.backup
              echo "==> Backed up previous config (Previous image: ${PREVIOUS_IMAGE:-none})"
            fi
            
            # --- BUILD .env.production ---
            # 1. Start with secrets (passwords, API keys, DB/Redis config)
            printf "%s" "$PROD_SECRETS" > .env.production
            echo "" >> .env.production
            
            # 2. Add non-sensitive variables (auditable, visible in logs)
            echo "# --- Non-Sensitive Config (from Repository Variables) ---" >> .env.production
            echo "FRONTEND_URL=$FRONTEND_URL" >> .env.production
            [ -n "$ALLOWED_ORIGINS" ] && echo "ALLOWED_ORIGINS=$ALLOWED_ORIGINS" >> .env.production
            
            # 3. Add deployment metadata
            echo "BACKEND_IMAGE=$IMAGE_TAG" >> .env.production
            
            # Secure the env file
            chmod 600 .env.production
            
            # --- DEPLOYMENT ---
            echo "==> Pulling new image..."
            docker compose --env-file .env.production -f docker-compose.production.yml pull backend
            
            echo "==> Starting new container..."
            docker compose --env-file .env.production -f docker-compose.production.yml up -d --no-deps backend
            
            # Clean up old images to save disk space
            docker image prune -f
            
            # --- HEALTH CHECK (Wait up to 5 mins) ---
            echo "==> Verifying Health..."
            HEALTH_OK=false
            # Increased to 60 attempts (5 minutes) for very slow startups
            for i in {1..60}; do
              if curl -fsS http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✓ Health check passed!"
                HEALTH_OK=true
                break
              fi
              echo "Waiting for app to start... ($i/60)"
              sleep 5
            done
            
            if [ "$HEALTH_OK" = true ]; then
              echo "✓ Deployment Successful!"
              # Clean up backup on success
              rm -f .env.production.backup
              exit 0
            fi
            
            # --- ROLLBACK ON FAILURE ---
            echo "✗ Health check failed! Initiating rollback..."
            
            if [ -n "$PREVIOUS_IMAGE" ] && [ -f .env.production.backup ]; then
              echo "==> Rolling back to: $PREVIOUS_IMAGE"
              cp .env.production.backup .env.production
              docker compose --env-file .env.production -f docker-compose.production.yml up -d --no-deps backend
            
              # Verify rollback health
              sleep 10
              if curl -fsS http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✓ Rollback successful - service restored"
              else
                echo "✗ Rollback also failed - MANUAL INTERVENTION REQUIRED"
              fi
            else
              echo "✗ No previous version to rollback to - MANUAL INTERVENTION REQUIRED"
            fi
            
            exit 1