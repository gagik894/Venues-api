# ================== SERVER ==================
# We default to 8080 because that matches our Dockerfile
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
# Compression (Excellent for mobile users)
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# ================== DATABASE (PROD) ==================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# Validation only. We let Flyway handle changes (Safer).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
# Performance Tuning (Batch Inserts)
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ================== MIGRATIONS (FLYWAY) ==================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# ================== MAIL ==================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================== SECURITY ==================
app.security.cookie.secure=${COOKIE_SECURE:true}
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration-ms=86400000
# ================== CACHE ==================
# Hybrid approach: Caffeine for speed, Redis for distributed data
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}
spring.data.redis.timeout=5s
# ================== LOGGING ==================
logging.level.root=INFO
logging.level.app.venues=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
# Silence SQL logs in prod to prevent leaking user data
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
# ================== ACTUATOR (HEALTH CHECKS) ==================
# This is REQUIRED for the deployment script to know if the app is alive
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ================== FRONTEND ==================
app.frontend.url=${FRONTEND_URL:https://venues.app}