# ===================================================================
# Venues API - Government-Sponsored Cultural Venues Portal
# Application Configuration
# Copyright (c) 2025 Government Cultural Department
# ===================================================================

# ===================================================================
# APPLICATION INFORMATION
# ===================================================================
spring.application.name=venues-api
spring.application.description=Government-Sponsored Cultural Venues Portal Backend
spring.application.version=1.0.0

# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=8080
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# Graceful shutdown - wait for active requests to complete
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# ===================================================================
# DATABASE CONNECTION (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/venues
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool configuration (HikariCP)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ===================================================================
# JPA & HIBERNATE CONFIGURATION
# ===================================================================
# Don't use Hibernate DDL - Flyway manages schema
# Options: none, validate, update, create, create-drop
# - none: Hibernate does nothing (Flyway manages schema) [RECOMMENDED]
# - validate: Hibernate validates schema matches entities (use AFTER Flyway runs)
# - update: Hibernate auto-updates schema (NOT recommended - use Flyway instead)
# - create/create-drop: Hibernate drops and recreates schema (NEVER use in production)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Hibernate dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate statistics (disable in production)
spring.jpa.properties.hibernate.generate_statistics=false
# ===================================================================
# FLYWAY DATABASE MIGRATION
# ===================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
# Clean database on startup (DEVELOPMENT ONLY - NEVER USE IN PRODUCTION)
# This will drop all objects in the configured schemas and recreate them
spring.flyway.clean-disabled=false
# Repair Flyway schema history table on startup (fixes checksum mismatches)
# Note: In production, you should manually run flyway:repair instead
spring.flyway.repair-on-migrate=false

# ===================================================================
# JACKSON JSON CONFIGURATION
# ===================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
logging.level.root=INFO
logging.level.app.venues=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===================================================================
# ACTUATOR CONFIGURATION (Health & Monitoring)
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ===================================================================
# SECURITY CONFIGURATION
# ===================================================================
# JWT Token Configuration (externalize in production via environment variables)
app.security.jwt.secret=${JWT_SECRET:ThisIsATemporarySecretKeyForDevelopmentOnlyPleaseChangeInProduction}
app.security.jwt.expiration-ms=86400000
app.security.jwt.refresh-expiration-ms=2592000000


# ===================================================================
# SPRINGDOC / OPENAPI CONFIGURATION
# ===================================================================
springdoc.api-docs.path=/v1/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/v1/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.csrf.enabled=false
springdoc.show-actuator=true

# ===================================================================
# INTERNATIONALIZATION (i18n)
# ===================================================================
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ===================================================================
# FILE UPLOAD CONFIGURATION
# ===================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================================================
# CACHE CONFIGURATION
# ===================================================================
spring.cache.type=simple
# For production, consider using Redis or other distributed cache
# spring.cache.type=redis
# spring.redis.host=localhost
# spring.redis.port=6379

