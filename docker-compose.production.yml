services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: gov-backend-prod
    restart: always
    
    ports:
      # SECURITY: Only listen on localhost. The internet cannot touch this port directly.
      - "127.0.0.1:8080:8080"
    
    # Load environment variables from the file created by GitHub Actions
    env_file:
      - .env.production
    
    # Resource Quotas (Prevent one app from crashing the whole server)
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 6G
        reservations:
          memory: 2G

    # Production Logging (prevents disk filling up)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"