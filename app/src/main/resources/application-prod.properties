# ================== SERVER ==================
# We default to 8080 because that matches our Dockerfile
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
# Compression (Excellent for mobile users)
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
# Request size limits (DDoS protection)
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-form-post-size=10MB

# ================== DATABASE (PROD) ==================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# HikariCP Connection Pool (Optimized for Neon DB - zero idle connections)
# minimum-idle=0 ensures all connections are closed when idle, allowing CU usage to drop to 0
# idle-timeout=10000 (10s) ensures connections close quickly after scheduled tasks complete
# 
# ADAPTIVE SCHEDULING: Scheduled tasks use smart execution that skips DB connections when no work found.
# - Tasks run every 60s, but skip execution (no DB connection) if no work found for 5+ consecutive runs
# - After 5 skips (5 minutes), tasks check every 6 minutes instead of every minute
# - This allows Neon to scale to 0 during idle periods (5+ minutes of no work = no DB connections)
# - When work exists, tasks run normally and process immediately
# 
# Note: Ensure JDBC URL includes tcpKeepAlive=false if using direct connection (not pooler)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# Validation only. We let Flyway handle changes (Safer).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
# Performance Tuning (Batch Inserts)
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# ================== MIGRATIONS (FLYWAY) ==================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# ================== MAIL ==================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================== SECURITY ==================
app.security.cookie.secure=${COOKIE_SECURE:true}
# JWT Secret mapped in application.properties dependent on APP_SECURITY_JWT_SECRET
app.security.jwt.expiration-ms=86400000
# ================== CACHE ==================
# Hybrid approach: Caffeine for speed, Redis for distributed data
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m

# Redis config is auto-configured via SPRING_DATA_REDIS_* env vars
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}
spring.data.redis.database=${SPRING_DATA_REDIS_DATABASE:0}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:true}
spring.data.redis.timeout=5s
# ================== LOGGING ==================
logging.level.root=INFO
logging.level.app.venues=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
# Silence SQL logs in prod to prevent leaking user data
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
# ================== ACTUATOR (HEALTH CHECKS) ==================
# This is REQUIRED for the deployment script to know if the app is alive
# Disable database health check to prevent keeping connections open
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.endpoints.web.base-path=/actuator
management.health.db.enabled=false
management.health.datasource.enabled=false

# ================== FRONTEND ==================
app.frontend.url=${FRONTEND_URL:https://venues.app}