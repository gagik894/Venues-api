# Platform Module Redis Configuration
#
# Production-ready Redis configuration for nonce caching
# Used to prevent replay attacks across distributed instances

platform:
  redis:
    # Redis host (use environment variable in production)
    host: ${PLATFORM_REDIS_HOST:localhost}

    # Redis port
    port: ${PLATFORM_REDIS_PORT:6379}

    # Redis password (use environment variable in production)
    password: ${PLATFORM_REDIS_PASSWORD:}

    # Redis database index (0-15)
    database: ${PLATFORM_REDIS_DATABASE:1}

    # Connection timeout
    timeout: 2s

# Redis connection pool configuration (Lettuce)
spring:
  data:
    redis:
      lettuce:
        pool:
          # Maximum active connections
          max-active: 8
          # Maximum idle connections
          max-idle: 8
          # Minimum idle connections
          min-idle: 2
          # Maximum wait time for connection
          max-wait: 2s
        shutdown-timeout: 100ms

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

platform:
  redis:
    host: localhost
    port: 6379
    database: 1

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

platform:
  redis:
    # Use environment variables in production
    host: ${PLATFORM_REDIS_HOST}
    port: ${PLATFORM_REDIS_PORT:6379}
    password: ${PLATFORM_REDIS_PASSWORD}
    database: ${PLATFORM_REDIS_DATABASE:1}
    timeout: 5s

  data:
    redis:
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

