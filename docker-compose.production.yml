services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: gov-backend-prod
    restart: always
    
    ports:
      # SECURITY: Only listen on localhost
      - "127.0.0.1:8080:8080"
    
    # Force production profile
    environment:
      - SPRING_PROFILES_ACTIVE=production
    
    # Load standardized environment variables
    env_file:
      - .env.production
    
    # Persistence for user uploads
    volumes:
      - ./uploads:/app/uploads
    
    # Resource Quotas (Prevent one app from crashing the whole server)
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 6G
        reservations:
          memory: 2G

    # Production Logging (prevents disk filling up)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"