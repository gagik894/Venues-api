<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{email/layout :: layout('Verify Your Staff Account', ~{::content})}">

<body>
<div th:fragment="content">
    <p>Hello <span th:text="${name}">Staff Member</span>,</p>
    <p>You have been registered as a staff member for ArmTick.am.</p>
    <p>Please click the button below to verify your email address and activate your account:</p>
    <a th:href="${verificationUrl}" class="button">Verify Account</a>
    <p>If you did not request this account, please ignore this email.</p>
    <p>This link will expire in 24 hours.</p>
</div>
</body>

</html>
