version: '3.8'

services:
  postgres-db:
    image: postgres:14-alpine
    container_name: gov-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=venues
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gov-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: