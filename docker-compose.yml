# Development Docker Compose Configuration
# For production use: docker-compose.production.yml

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: gov-backend:local
    container_name: gov-backend-dev
    ports:
      - "8080:8080"
    
    # Load local development environment variables
    env_file:
      - .env
    
    environment:
      SPRING_PROFILES_ACTIVE: dev
    
    volumes:
      # Mount uploads directory for local development
      - ./uploads:/app/uploads
    
    # Allow restart on failure for local development
    restart: unless-stopped
    
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s